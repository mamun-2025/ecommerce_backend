
<h1>Login</h1>
<form method="POST">

   {% csrf_token %}

   <input type="email" name="email" placeholder="Email">
   <br><br>
   <input type="password" name="password" placeholder="Password">
   <br><br>
   <button type="submit">Login</button>

</form>

{% for message in messages %}
<p>{{ message }}</p>
{% endfor %}
